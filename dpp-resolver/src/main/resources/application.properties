spring.application.name=dpp_resolver

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dpp_resolver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true

spring.jpa.hibernate.ddl-auto=validate

# All JSON across the federation is snake_case. The platforms already emit snake_case;
# this aligns the Resolver so every service speaks the same wire format (no per-DTO naming).
spring.jackson.property-naming-strategy=SNAKE_CASE
