<div class="modal-overlay" [class.open]="isOpen()">
  <div class="modal-container">
    <header class="modal-header">
      <h2>Spawn New Platform</h2>
      <button class="close-btn" (click)="close()" [disabled]="isSpawning()">×</button>
    </header>

    <div class="modal-body">
      <div class="form-group">
        <label>Stack</label>
        <select [(ngModel)]="stack" [disabled]="isSpawning()">
          <option value="spring-postgres">Java (Spring + Postgres)</option>
          <option value="fastapi-mongo">Python (FastAPI + MongoDB)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Issuer ID</label>
        <input type="text" [(ngModel)]="issuerId" placeholder="e.g. issuerD" [disabled]="isSpawning()">
        <small class="hint">Lowercase alphanumeric and dashes only.</small>
      </div>

      <div class="form-group">
        <label>Subject Types (Select at least one)</label>
        <div class="chip-container">
          @for (type of availableSubjectTypes(); track type) {
            <div class="chip"
                 [class.selected]="selectedSubjectTypes().includes(type)"
                 (click)="!isSpawning() && toggleSubjectType(type)">
              {{ type }}
            </div>
          }
        </div>
      </div>

      @if (isSpawning()) {
        <div class="progress-indicator">
          <div class="spinner"></div>
          <p>Spawning platform... this may take up to 30 seconds.</p>
        </div>
      }
    </div>

    <footer class="modal-footer">
      <button class="btn btn-secondary" (click)="close()" [disabled]="isSpawning()">Cancel</button>
      <button class="btn btn-primary" [disabled]="!isValid() || isSpawning()" (click)="onSubmit()">
        {{ isSpawning() ? 'Spawning...' : 'Spawn Platform' }}
      </button>
    </footer>
  </div>
</div>
