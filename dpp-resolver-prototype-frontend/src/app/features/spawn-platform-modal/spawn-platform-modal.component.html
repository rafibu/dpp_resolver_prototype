<h2 mat-dialog-title>
  <mat-icon>add_circle</mat-icon>
  Spawn Platform
</h2>

<mat-dialog-content class="dialog-content">
  <section class="field-block">
    <label>Stack</label>
    <mat-button-toggle-group
      [value]="stack()"
      [disabled]="isSpawning()"
      (valueChange)="stack.set($event)"
      aria-label="Platform stack"
    >
      <mat-button-toggle value="spring-postgres">Java Spring</mat-button-toggle>
      <mat-button-toggle value="fastapi-mongo">Python FastAPI</mat-button-toggle>
    </mat-button-toggle-group>
  </section>

  <mat-form-field appearance="outline">
    <mat-label>Issuer ID</mat-label>
    <input
      matInput
      [ngModel]="issuerId()"
      (ngModelChange)="issuerId.set($event)"
      [disabled]="isSpawning()"
      autocomplete="off"
      placeholder="issuer-d"
    >
    <mat-hint>Lowercase letters, digits, and dashes.</mat-hint>
    @if (issuerInvalid()) {
      <mat-error>Use lowercase letters, digits, and dashes only.</mat-error>
    }
  </mat-form-field>

  <section class="field-block">
    <label>Subject Types</label>
    <mat-chip-listbox aria-label="Subject types" multiple>
      @for (type of availableSubjectTypes(); track type) {
        <mat-chip-option
          [selected]="selectedSubjectTypes().includes(type)"
          [disabled]="isSpawning()"
          (selectionChange)="toggleSubjectType(type, $event.selected)"
        >
          {{ type }}
        </mat-chip-option>
      }
    </mat-chip-listbox>
  </section>

  @if (isSpawning()) {
    <div class="progress-panel" aria-live="polite">
      <mat-progress-bar mode="indeterminate" />
      <span>Spawning platform</span>
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [disabled]="isSpawning()" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!isValid() || isSpawning()" (click)="onSubmit()">
    <mat-icon>rocket_launch</mat-icon>
    Spawn
  </button>
</mat-dialog-actions>
